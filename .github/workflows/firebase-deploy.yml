name: Firebase Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------
  # Build + test on every push and PR.
  # ---------------------------------------------------------------
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('web/package-lock.json', 'functions/package-lock.json') }}

      - name: Write .firebaserc from secret
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$FIREBASE_PROJECT_ID" ]; then
            printf '{ "projects": { "default": "%s" } }\n' "$FIREBASE_PROJECT_ID" > .firebaserc
            cat .firebaserc
          else
            echo "::warning::FIREBASE_PROJECT_ID not set — using the committed .firebaserc"
          fi

      - name: Inject Firebase web config into environment.prod.ts
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          if [ -z "$FIREBASE_PROJECT_ID" ]; then
            echo "::warning::Firebase web config secrets not set — keeping placeholder environment.prod.ts"
            exit 0
          fi
          auth_domain="${FIREBASE_AUTH_DOMAIN:-${FIREBASE_PROJECT_ID}.firebaseapp.com}"
          storage_bucket="${FIREBASE_STORAGE_BUCKET:-${FIREBASE_PROJECT_ID}.appspot.com}"
          cat > web/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            useEmulators: false,
            firebase: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${auth_domain}',
              projectId: '${FIREBASE_PROJECT_ID}',
              storageBucket: '${storage_bucket}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId: '${FIREBASE_APP_ID}',
            },
          };
          EOF
          echo "✓ environment.prod.ts regenerated"

      - name: Install web deps
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build Angular (production)
        working-directory: web
        run: npm run build -- --configuration=production

      - name: Install functions deps
        working-directory: functions
        run: npm install --no-audit --no-fund

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Run functions tests
        working-directory: functions
        continue-on-error: true
        run: npm test

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 3

  # ---------------------------------------------------------------
  # PR preview channels (7-day expiry). Runs only when secrets exist.
  # ---------------------------------------------------------------
  deploy-preview:
    name: Deploy preview channel
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Check secrets
        id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$SA" ] || [ -z "$PID" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Missing FIREBASE_SERVICE_ACCOUNT or FIREBASE_PROJECT_ID secret — skipping preview deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download web build
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Firebase Hosting preview channel
        if: steps.check.outputs.skip != 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          expires: 7d

  # ---------------------------------------------------------------
  # Production deploy — on push to master/main.
  # ---------------------------------------------------------------
  deploy-production:
    name: Deploy production
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify required secrets
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$SA" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set"
            missing=1
          fi
          if [ -z "$PID" ]; then
            echo "::error::FIREBASE_PROJECT_ID secret is not set"
            missing=1
          fi
          if [ $missing -eq 1 ]; then exit 1; fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Write .firebaserc
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          printf '{ "projects": { "default": "%s" } }\n' "$FIREBASE_PROJECT_ID" > .firebaserc

      - name: Inject Firebase web config
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: |
          auth_domain="${FIREBASE_AUTH_DOMAIN:-${FIREBASE_PROJECT_ID}.firebaseapp.com}"
          storage_bucket="${FIREBASE_STORAGE_BUCKET:-${FIREBASE_PROJECT_ID}.appspot.com}"
          cat > web/src/environments/environment.prod.ts <<EOF
          export const environment = {
            production: true,
            useEmulators: false,
            firebase: {
              apiKey: '${FIREBASE_API_KEY}',
              authDomain: '${auth_domain}',
              projectId: '${FIREBASE_PROJECT_ID}',
              storageBucket: '${storage_bucket}',
              messagingSenderId: '${FIREBASE_MESSAGING_SENDER_ID}',
              appId: '${FIREBASE_APP_ID}',
            },
          };
          EOF

      - name: Install & build web
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build -- --configuration=production

      - name: Install & build functions
        working-directory: functions
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules + Storage rules
        run: firebase deploy --only firestore,storage --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

      - name: Deploy Functions (non-blocking)
        continue-on-error: true
        run: firebase deploy --only functions --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive

      - name: Deploy Hosting (predeploy + postdeploy hooks run here)
        run: firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --non-interactive
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

      - name: Print live URL
        if: success()
        run: |
          echo "✅ Deployed: https://${{ secrets.FIREBASE_PROJECT_ID }}.web.app"

      - name: Cleanup credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
