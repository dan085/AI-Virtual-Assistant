name: Firebase Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: firebase-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ---------------------------------------------------------------
  # Build + test on every push and PR.
  # ---------------------------------------------------------------
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('web/package-lock.json', 'functions/package-lock.json') }}

      - name: Override .firebaserc from secret (optional)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$FIREBASE_PROJECT_ID" ]; then
            printf '{ "projects": { "default": "%s" } }\n' "$FIREBASE_PROJECT_ID" > .firebaserc
            echo "Overrode .firebaserc to project: $FIREBASE_PROJECT_ID"
          else
            echo "Using committed .firebaserc:"
            cat .firebaserc
          fi

      - name: Install web deps
        working-directory: web
        run: npm install --no-audit --no-fund

      - name: Build Angular (production)
        working-directory: web
        run: npm run build -- --configuration=production

      - name: Install functions deps
        working-directory: functions
        run: npm install --no-audit --no-fund

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Run functions tests
        working-directory: functions
        continue-on-error: true
        run: npm test

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 3

  # ---------------------------------------------------------------
  # PR preview channels (7-day expiry). Runs only when secrets exist.
  # ---------------------------------------------------------------
  deploy-preview:
    name: Deploy preview channel
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve project id
        id: project
        env:
          PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$PID" ]; then
            echo "id=$PID" >> "$GITHUB_OUTPUT"
          else
            id=$(node -p "require('./.firebaserc').projects.default")
            echo "id=$id" >> "$GITHUB_OUTPUT"
          fi

      - name: Check service account secret
        id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::FIREBASE_SERVICE_ACCOUNT secret not set — skipping preview deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download web build
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Deploy to Firebase Hosting preview channel
        if: steps.check.outputs.skip != 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ steps.project.outputs.id }}
          expires: 7d

  # ---------------------------------------------------------------
  # Production deploy — on push to master/main.
  # ---------------------------------------------------------------
  deploy-production:
    name: Deploy production
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify service account secret
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$SA" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT secret is not set. Create a service account key JSON and add it to GitHub Secrets."
            exit 1
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@latest

      - name: Resolve project id
        id: project
        env:
          PID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -n "$PID" ]; then
            echo "id=$PID" >> "$GITHUB_OUTPUT"
            printf '{ "projects": { "default": "%s" } }\n' "$PID" > .firebaserc
          else
            id=$(node -p "require('./.firebaserc').projects.default")
            echo "id=$id" >> "$GITHUB_OUTPUT"
          fi
          echo "Project: $(node -p \"require('./.firebaserc').projects.default\")"

      - name: Install & build web
        working-directory: web
        run: |
          npm install --no-audit --no-fund
          npm run build -- --configuration=production

      - name: Install & build functions
        working-directory: functions
        run: |
          npm install --no-audit --no-fund
          npm run build

      - name: Authenticate Firebase
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy Firestore rules + Storage rules
        run: firebase deploy --only firestore,storage --project ${{ steps.project.outputs.id }} --non-interactive

      - name: Deploy Functions (non-blocking)
        continue-on-error: true
        run: firebase deploy --only functions --project ${{ steps.project.outputs.id }} --non-interactive

      - name: Deploy Hosting (predeploy + postdeploy hooks run here)
        run: firebase deploy --only hosting --project ${{ steps.project.outputs.id }} --non-interactive
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}

      - name: Print live URL
        if: success()
        run: |
          echo "✅ Deployed: https://${{ steps.project.outputs.id }}.web.app"

      - name: Cleanup credentials
        if: always()
        run: rm -f "$RUNNER_TEMP/sa.json"
